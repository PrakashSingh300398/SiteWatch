[build]
builder = "nixpacks"
buildCommand = "npm install --legacy-peer-deps && npx prisma generate --schema=apps/api/prisma/schema.prisma && npm run build --workspace=apps/api"

[deploy]
startCommand = "npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma && node apps/api/dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
